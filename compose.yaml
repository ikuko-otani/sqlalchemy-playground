version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sqlalchemy_playground_postgres
    environment:
      POSTGRES_DB: playground
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d playground"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
