version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sqlalchemy_playground_postgres
    environment:
      POSTGRES_DB: ledger_db
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
