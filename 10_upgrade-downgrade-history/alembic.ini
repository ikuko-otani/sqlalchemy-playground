# alembic.ini - Alembic configuration (ASCII only)
# Japanese comments removed to prevent cp932 UnicodeDecodeError on Windows
[alembic]
script_location = alembic

# Sync driver URL for alembic CLI (psycopg2)
sqlalchemy.url = postgresql+psycopg2://postgres:password@localhost:5432/playground_a03

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
