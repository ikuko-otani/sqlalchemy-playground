# compose.yaml — PostgreSQL for local exercises
# 日本語訳：ローカル演習用 PostgreSQL の Docker Compose 設定
#
# Usage: docker compose up -d postgres

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
