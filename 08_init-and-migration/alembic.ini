# Alembic configuration file for Chapter A-01
# WARNING: Keep this file ASCII-only to avoid UnicodeDecodeError on Windows (cp932).

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# Sync driver required by Alembic's env.py (psycopg2, not asyncpg)
sqlalchemy.url = postgresql+psycopg2://postgres:password@localhost:5432/playground_a01

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
